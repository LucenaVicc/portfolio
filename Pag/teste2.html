<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfólio - 3D Modal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
  <style>
    body {
      background-color: #0e0b1b;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px 0;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      margin-bottom: 30px;
    }

    .swiper {
      width: 90%;
      max-width: 900px;
      height: 400px;
      position: relative;
      padding-bottom: 60px; /* Menos para deixar espaço para controles */
      box-sizing: border-box;
    }

    .swiper-slide {
      background-color: #7b6eea;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      width: 250px;
      height: 300px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      cursor: pointer;
    }

    /* Ajuste da div dos controles - flex para alinhar botões e pagination */
    .swiper-controls {
      /* Removido position absolute para alinhamento natural */
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
      /* largura total para ficar alinhado com swiper */
      width: 100%;
      max-width: 900px;
      box-sizing: border-box;
      padding: 0 15px;
    }

    .swiper-button-next,
    .swiper-button-prev,
    .swiper-pagination {
      position: static; /* já estava */
    }

    .swiper-button-next,
    .swiper-button-prev {
      background-color: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(5px);
      border-radius: 999px;
      width: 50px;
      height: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.3s ease;
      cursor: pointer;
      user-select: none;
    }

    .swiper-button-next::after,
    .swiper-button-prev::after {
      font-size: 18px;
      color: #9186f3;
    }

    .swiper-button-next:hover,
    .swiper-button-prev:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .swiper-pagination {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .swiper-pagination-bullet {
      background: #9186f3;
      opacity: 0.5;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transition: transform 0.3s ease, opacity 0.3s ease;
      cursor: pointer;
    }

    .swiper-pagination-bullet-active {
      transform: scale(1.5);
      opacity: 1;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-bg.active {
      display: flex;
    }

    .modal {
      background: transparent;
      border: none;
      padding: 0;
      position: relative;
      max-width: 350px;
      width: 90%;
    }

    .close-btn {
      position: absolute;
      top: -10px;
      right: -10px;
      font-size: 26px;
      background: #1a1533;
      border: 2px solid #7b6eea;
      border-radius: 50%;
      color: #fff;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
    }

    .card {
      width: 100%;
      height: 400px;
      background: linear-gradient(135deg, #1e90ff, #00bfff);
      border-radius: 20px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.5);
      transition: transform 0.1s ease-out;
      transform-style: preserve-3d;
      perspective: 1000px;
      cursor: pointer;
      position: relative;
      color: white;
      padding: 20px;
    }

    .card-content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .card-content h2 {
      margin-top: 0;
    }

    .card-content p {
      font-size: 15px;
      line-height: 1.6;
    }

    .reflection {
      position: absolute;
      bottom: 10px;
      width: 100%;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent);
      border-radius: 20px;
      transform: translateZ(-50px) scaleY(-1);
      opacity: 0.4;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>Meus Projetos</h1>
  <div class="swiper mySwiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide" data-title="Projeto 1" data-description="Esse é o Projeto 1. Feito com HTML, CSS e JS. Layout responsivo e animações.">Projeto 1</div>
      <div class="swiper-slide" data-title="Projeto 2" data-description="Projeto 2. Criado com React, tem integração com APIs externas.">Projeto 2</div>
      <div class="swiper-slide" data-title="Projeto 3" data-description="Projeto 3. Site institucional com foco em acessibilidade e performance.">Projeto 3</div>
      <div class="swiper-slide" data-title="Projeto 4" data-description="Projeto 4. App de controle financeiro com gráficos interativos.">Projeto 4</div>
      <div class="swiper-slide" data-title="Projeto 5" data-description="Projeto 5. Landing page com foco em conversão e UX.">Projeto 5</div>
    </div>
    <div class="swiper-controls">
      <div class="swiper-button-prev"></div>
      <div class="swiper-pagination"></div>
      <div class="swiper-button-next"></div>
    </div>
  </div>

  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <button class="close-btn" id="close-modal">&times;</button>
      <div class="card" id="card-3d">
        <div class="card-content">
          <h2 id="modal-title">Título do Projeto</h2>
          <p id="modal-description">Descrição do projeto...</p>
        </div>
        <div class="reflection"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const swiper = new Swiper(".mySwiper", {
      effect: "coverflow",
      grabCursor: true,
      centeredSlides: true,
      slidesPerView: "auto",
      loop: true,
      coverflowEffect: {
        rotate: 0,
        stretch: 0,
        depth: 120,
        modifier: 2,
        slideShadows: false,
      },
      pagination: {
        el: ".swiper-pagination",
        clickable: true,
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
    });

    const modalBg = document.getElementById('modal-bg');
    const modalTitle = document.getElementById('modal-title');
    const modalDescription = document.getElementById('modal-description');
    const closeModal = document.getElementById('close-modal');
    const card3D = document.getElementById('card-3d');

    document.querySelectorAll('.swiper-slide').forEach(slide => {
      slide.addEventListener('click', () => {
        modalTitle.textContent = slide.getAttribute('data-title');
        modalDescription.textContent = slide.getAttribute('data-description');
        modalBg.classList.add('active');
      });
    });

    closeModal.addEventListener('click', () => {
      modalBg.classList.remove('active');
    });

    modalBg.addEventListener('click', (e) => {
      if (e.target === modalBg) {
        modalBg.classList.remove('active');
      }
    });

    card3D.addEventListener('mousemove', (e) => {
      const rect = card3D.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const centerX = rect.width / 2;
      const centerY = rect.height / 2;

      const rotateX = ((y - centerY) / centerY) * 15;
      const rotateY = ((x - centerX) / centerX) * 15;

      card3D.style.transform = `rotateX(${-rotateX}deg) rotateY(${rotateY}deg) translateZ(30px)`;
    });

    card3D.addEventListener('mouseleave', () => {
      card3D.style.transform = 'rotateX(0deg) rotateY(0deg) translateZ(0)';
    });
  </script>
</body>
</html>
